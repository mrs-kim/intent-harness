id: dec_u9phe444
type: decision
domain: dom_hrns4x2k
title: Record id field is not editable in the review page
outcome: excluded
rationale: >-
  The id field is the stable identifier that all cross-record references depend
  on. Allowing it to be edited in the browser would silently break graph
  integrity. All other fields are editable.
revisit-when: >-
  If a rename/migration workflow is introduced that updates all references
  atomically, a controlled id change could be supported with explicit warnings.
