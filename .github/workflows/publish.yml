name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write  # for npm provenance

jobs:
  test:
    name: Run tests before publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Validate own records
        run: npm run validate-self

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${{ steps.version.outputs.version }}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "✗ package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            echo "  Update package.json version before tagging."
            exit 1
          fi
          echo "✓ Version match: $PKG_VERSION"

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              name: `v${version}`,
              body: [
                `## intent-harness v${version}`,
                '',
                'Install or upgrade:',
                '```bash',
                'npm install -g intent-harness',
                '# In existing projects:',
                'intent upgrade',
                '```',
                '',
                'See [CHANGELOG.md](./CHANGELOG.md) for what changed.',
              ].join('\n'),
              draft: false,
              prerelease: version.includes('-'),
            });
