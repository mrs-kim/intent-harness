title: Review page provides rich filtering across multiple dimensions
behavior: >-
  The intent review page includes filters for: record type (job, requirement,
  decision, design-principle), legitimacy status (proposed, approved,
  superseded), domain, ingestion confidence (high, medium, low),
  implementation status (unbuilt, in-progress, complete), and lifecycle
  (active, deprecated). Filters can be combined. The active filter state
  is visible at all times.
rationale: >-
  A project with hundreds of records needs multiple ways to slice the view.
  Which filters are actually useful will emerge from use — start broad and
  prune later.
