figma-version: "2026-05-14"
design-system-ref: button-secondary@3.1.0
notes: >
  Secondary button, right-aligned in the dashboard header row alongside
  existing header actions. Label: "Export CSV". On click, the button enters
  a loading state (spinner replaces label) until the download begins.
  No modal, no confirmation step — the action is immediately reversible
  since it only downloads, it doesn't mutate data.
  Do not use a warning or destructive button variant — this is a read action.
