id: dec_test01
type: decision
title: Test fixtures do not use real product data
domain: dom_test01
outcome: excluded
rationale: >
  Using real product data in test fixtures creates coupling between
  the test suite and the product requirements.
revisit-when: >
  If integration tests require real record shapes, add a separate
  fixtures directory for integration tests.
