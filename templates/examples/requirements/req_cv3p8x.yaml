acceptance-criteria:
- given: An admin is viewing the team dashboard
  then: A CSV file downloads containing name, email, and completion status for all
    current members
  when: They trigger the CSV export
- given: The team has more than 100 members
  then: The trigger element shows a loading state until the download begins
  when: The export is triggered
- given: A member has left the team
  then: The departed member does not appear in the CSV
  when: The export is triggered
behavior: 'An admin viewing the team dashboard can trigger a CSV export containing
  each current team member''s name, email, and onboarding completion status. The file
  downloads in the browser. For large teams the download may take a few seconds; the
  trigger element reflects this with a loading state.

  '
